# Version: 1.11.0
blueprint:
  domain: automation
  name: "☀️ Sun-Aware Shutter Control"
  author: r3mcos3
  source_url: https://github.com/r3mcos3/blueprints/blob/main/sun_shutter_control/sun_shutter_control.yaml
  homeassistant:
    min_version: 2025.12.0
  description: >
    📦 [Version 1.11.0] Automatic shutter control based on sun position 🌞.


    Automatically closes shutters when the sun shines on the front or back of your house,
    and opens them again once the sun moves away. Uses the sun's azimuth (compass direction
    0–360°) and compares it to your house orientation.


    Features:

    - ☀️ Automatically close shutters when the sun shines on the front or back facade

    - 🔄 Automatically open shutters when the sun moves away (optional)

    - 📐 Configurable sun window (degrees of margin per facade)

    - 🌅 Minimum sun elevation setting (no action for low morning or evening sun)

    - 🔽 Configurable close and open position

    - 🖐️ Manual override — triggers when a shutter is manually **closed** (always),
      or when manually **opened while someone is home** (presence-aware). When nobody
      is home the automation always takes full control: manual opens are ignored and
      the shutter closes when the sun shines on the facade.
      Override resets automatically once the shutter returns to the open position
      (e.g. after the user opens it manually again)

    - 🌤️ Cloud detection — optional weather integration: when it's overcast the shutters
      stay open (or open automatically if they were closed)

    - ⏱️ Anti-oscillation cooldown — minimum wait time between moves to prevent
      rapid up/down on partly cloudy days

    - 📍 Position awareness — skips the command if shutters are already at the target position


    🌐 Finding your house azimuth — Go to https://www.suncalc.org/, find your house and
    determine which direction your front door faces. The orange line shows the sun direction
    per time of day, but you need your facade direction (fixed compass bearing).
    North = 0°, East = 90°, South = 180°, West = 270°.
    The back of the house is calculated automatically (front + 180°).


    🖐️ Setting up manual override — Create a Toggle helper per facade side via
    Settings → Devices & Services → Create Helper → Toggle (input_boolean),
    e.g. "Shutter front manual". Link it below. The automation turns it on when a shutter
    on that side is manually **closed** (always), or manually **opened while someone is
    home** (when a presence entity is configured). It turns off once the shutter returns
    to the open position.
    When nobody is home the automation ignores any override and closes on sun position.

  input:
    # ===== REQUIRED: HOUSE ORIENTATION =====
    front_facing_azimuth:
      name: "🏠 Front facade direction (azimuth)"
      description: >
        The compass direction (azimuth) your front facade faces.
        North = 0°, East = 90°, South = 180°, West = 270°.
        Stand at your front door and look straight outside — that direction is this value.
        The back facade is calculated automatically as front + 180°.
      default: 180
      selector:
        number:
          min: 0
          max: 359
          step: 1
          unit_of_measurement: "°"
          mode: slider

    # ===== REQUIRED: COVERS =====
    front_covers:
      name: "🏠 Front shutters"
      description: >
        Shutters on the front of the house. Closed when the sun shines on the front facade.
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: cover

    back_covers:
      name: "🏡 Back shutters"
      description: >
        Shutters on the back of the house. Closed when the sun shines on the back facade.
      default: []
      selector:
        entity:
          multiple: true
          filter:
            - domain: cover

    # ===== SUN SETTINGS (COLLAPSED) =====
    sun_settings:
      name: "☀️ Sun Settings"
      icon: mdi:weather-sunny
      collapsed: true
      input:
        sun_window:
          name: "📐 Sun window angle"
          description: >
            How many degrees to the left and right of the facade direction the sun is
            considered to be "shining on that facade". Default 90° means the sun counts
            from 90° left to 90° right of the facade direction (half the sky).
            Smaller = stricter, sun must shine more directly on the facade.
          default: 90
          selector:
            number:
              min: 10
              max: 120
              step: 5
              unit_of_measurement: "°"
              mode: slider

        min_elevation:
          name: "🌅 Minimum sun elevation"
          description: >
            Minimum height of the sun above the horizon (degrees) before the shutters
            are operated. Prevents action during low morning or evening sun.
            Set to 0 to always activate when the sun is on that facade.
          default: 10
          selector:
            number:
              min: 0
              max: 45
              step: 1
              unit_of_measurement: "°"
              mode: slider

    # ===== SHUTTER SETTINGS (COLLAPSED) =====
    cover_settings:
      name: "⚙️ Shutter Settings"
      icon: mdi:window-shutter
      collapsed: true
      input:
        close_position:
          name: "🔽 Close position (%)"
          description: >
            Position of the shutters when the sun shines on that facade.
            0% = fully closed, 50% = half closed, 100% = fully open.
          default: 0
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

        auto_open:
          name: "🔼 Automatically open"
          description: >
            Turn on to automatically open the shutters when the sun is no longer
            shining on that facade. Turn off to only close automatically.
          default: true
          selector:
            boolean:

        open_position:
          name: "🔼 Open position (%)"
          description: >
            Position the shutters move to when automatically opened (when
            "Automatically open" is on). 100% = fully open.
          default: 100
          selector:
            number:
              min: 0
              max: 100
              step: 5
              unit_of_measurement: "%"
              mode: slider

        cooldown_minutes:
          name: "⏱️ Cooldown between moves (minutes)"
          description: >
            Minimum time to wait before moving shutters again after a previous movement.
            Prevents rapid up-and-down movement on partly cloudy days.
            Set to 0 to disable.
          default: 20
          selector:
            number:
              min: 0
              max: 120
              step: 5
              unit_of_measurement: "min"
              mode: slider

    # ===== WEATHER SETTINGS (COLLAPSED) =====
    weather_settings:
      name: "🌤️ Weather Settings"
      icon: mdi:weather-cloudy
      collapsed: true
      input:
        weather_entity:
          name: "🌤️ Weather entity (optional)"
          description: >
            Link your weather integration here to enable cloud detection.
            When the weather condition is overcast or rainy, the shutters will
            be treated as if the sun is not shining — they stay open or open
            automatically (if "Automatically open" is enabled).
            Leave empty to ignore weather and only use sun position.
          default: {}
          selector:
            entity:
              filter:
                - domain: weather

        close_on_cloudy:
          name: "☁️ When to close based on weather"
          description: >
            Controls which weather conditions allow shutters to close.
            Only applies when a weather entity is configured above.
          default: "sunny_and_partly"
          selector:
            select:
              options:
                - label: "Always close (ignore weather)"
                  value: "always"
                - label: "Only when sunny or partly cloudy"
                  value: "sunny_and_partly"
                - label: "Only when sunny"
                  value: "sunny_only"

    # ===== MANUAL OVERRIDE (COLLAPSED) =====
    override_settings:
      name: "🖐️ Manual Override"
      icon: mdi:hand-back-right
      collapsed: true
      input:
        front_override_helper:
          name: "🖐️ Override helper front (optional)"
          description: >
            Link an input_boolean (toggle) helper for the front facade here.
            The automation turns it on when a front shutter is manually **closed**, or
            when manually **opened while someone is home** (requires presence entity below).
            It turns off when the sun moves away from the front facade.
            When nobody is home the automation ignores this override and closes on sun.
            Create via: Settings → Helpers → Create Helper → Toggle.
          default: {}
          selector:
            entity:
              filter:
                - domain: input_boolean

        back_override_helper:
          name: "🖐️ Override helper back (optional)"
          description: >
            Link an input_boolean (toggle) helper for the back facade here.
            Works the same as the front override helper.
          default: {}
          selector:
            entity:
              filter:
                - domain: input_boolean

        presence_person_1:
          name: "👤 Person 1 (optional)"
          description: >
            First household member. When this person is home, manual opens are
            respected and the automation will not close the shutter.
            When nobody is home the automation takes full control.
            Leave both persons empty to disable presence detection.
          default: {}
          selector:
            entity:
              filter:
                - domain: person
                - domain: device_tracker

        presence_person_2:
          name: "👤 Person 2 (optional)"
          description: >
            Second household member (e.g. partner). Works the same as Person 1.
            Leave empty if there is only one person to track.
          default: {}
          selector:
            entity:
              filter:
                - domain: person
                - domain: device_tracker

variables:
  v_front_facing: !input front_facing_azimuth
  v_sun_window: !input sun_window
  v_min_elevation: !input min_elevation
  v_auto_open: !input auto_open
  v_front_covers: !input front_covers
  v_back_covers: !input back_covers
  v_front_override: !input front_override_helper
  v_back_override: !input back_override_helper
  v_presence_person_1: !input presence_person_1
  v_presence_person_2: !input presence_person_2
  v_weather_entity: !input weather_entity
  v_cloud_mode: !input close_on_cloudy
  v_cooldown: !input cooldown_minutes
  v_close_pos: !input close_position
  v_open_pos: !input open_position
  v_front_override_active: >
    {{ v_front_override != {} and is_state(v_front_override, 'on') }}
  v_back_override_active: >
    {{ v_back_override != {} and is_state(v_back_override, 'on') }}
  # True when at least one configured person is home; false when nobody configured
  v_someone_home: >
    {{ (v_presence_person_1 != {} and is_state(v_presence_person_1, 'home')) or
       (v_presence_person_2 != {} and is_state(v_presence_person_2, 'home')) }}
  # True when the configured weather allows closing (or no weather entity set)
  v_weather_allows_close: >
    {% if v_weather_entity == {} %}
      true
    {% else %}
      {% set w = states(v_weather_entity) %}
      {{ v_cloud_mode == 'always' or
         (v_cloud_mode == 'sunny_and_partly' and w in ['sunny', 'partlycloudy']) or
         (v_cloud_mode == 'sunny_only' and w == 'sunny') }}
    {% endif %}
  # Calculate whether the sun is on the front facade:
  # Azimuth difference is normalized to -180..+180 via ((diff + 180) % 360) - 180
  # Angle difference smaller than the sun window = sun is on that facade
  v_sun_on_front: >
    {% set front = v_front_facing | float(180) %}
    {% set window = v_sun_window | float(90) %}
    {% set az = state_attr('sun.sun', 'azimuth') | float(0) %}
    {% set el = state_attr('sun.sun', 'elevation') | float(-90) %}
    {% set min_el = v_min_elevation | float(10) %}
    {% set diff = ((az - front + 180) % 360) - 180 %}
    {{ el >= min_el and diff | abs <= window }}
  v_sun_on_back: >
    {% set back = (v_front_facing | float(180) + 180) % 360 %}
    {% set window = v_sun_window | float(90) %}
    {% set az = state_attr('sun.sun', 'azimuth') | float(0) %}
    {% set el = state_attr('sun.sun', 'elevation') | float(-90) %}
    {% set min_el = v_min_elevation | float(10) %}
    {% set diff = ((az - back + 180) % 360) - 180 %}
    {{ el >= min_el and diff | abs <= window }}
  # Combines sun position and weather: true only when sun is on facade AND weather allows
  v_should_close_front: >
    {{ v_sun_on_front | bool and v_weather_allows_close | bool }}
  v_should_close_back: >
    {{ v_sun_on_back | bool and v_weather_allows_close | bool }}
  # True when the sun is above the minimum elevation (daytime)
  # Auto-open only fires when this is true — so shutters stay closed at night
  v_sun_active: >
    {{ state_attr('sun.sun', 'elevation') | float(-90) >= v_min_elevation | float(10) }}
  # Cooldown: true if any cover in the group was moved within the cooldown period
  v_front_on_cooldown: >
    {% if v_cooldown | int(0) == 0 %}
      false
    {% else %}
      {% set covers = [v_front_covers] if v_front_covers is string else v_front_covers | list %}
      {% set secs = v_cooldown | int(20) * 60 %}
      {% set ns = namespace(recent=false) %}
      {% for c in covers %}
        {% if (now() | as_timestamp) - (states[c].last_changed | as_timestamp) < secs %}
          {% set ns.recent = true %}
        {% endif %}
      {% endfor %}
      {{ ns.recent }}
    {% endif %}
  v_back_on_cooldown: >
    {% if v_cooldown | int(0) == 0 %}
      false
    {% else %}
      {% set covers = [v_back_covers] if v_back_covers is string else v_back_covers | list %}
      {% set secs = v_cooldown | int(20) * 60 %}
      {% set ns = namespace(recent=false) %}
      {% for c in covers %}
        {% if (now() | as_timestamp) - (states[c].last_changed | as_timestamp) < secs %}
          {% set ns.recent = true %}
        {% endif %}
      {% endfor %}
      {{ ns.recent }}
    {% endif %}
  # Position check: true if at least one cover is NOT already at the target position
  v_front_needs_close: >
    {% set covers = [v_front_covers] if v_front_covers is string else v_front_covers | list %}
    {% set target = v_close_pos | int(0) %}
    {% set ns = namespace(needs=false) %}
    {% for c in covers %}
      {% if state_attr(c, 'current_position') | int(-1) != target %}
        {% set ns.needs = true %}
      {% endif %}
    {% endfor %}
    {{ ns.needs }}
  v_front_needs_open: >
    {% set covers = [v_front_covers] if v_front_covers is string else v_front_covers | list %}
    {% set target = v_open_pos | int(100) %}
    {% set ns = namespace(needs=false) %}
    {% for c in covers %}
      {% if state_attr(c, 'current_position') | int(-1) != target %}
        {% set ns.needs = true %}
      {% endif %}
    {% endfor %}
    {{ ns.needs }}
  v_back_needs_close: >
    {% set covers = [v_back_covers] if v_back_covers is string else v_back_covers | list %}
    {% set target = v_close_pos | int(0) %}
    {% set ns = namespace(needs=false) %}
    {% for c in covers %}
      {% if state_attr(c, 'current_position') | int(-1) != target %}
        {% set ns.needs = true %}
      {% endif %}
    {% endfor %}
    {{ ns.needs }}
  v_back_needs_open: >
    {% set covers = [v_back_covers] if v_back_covers is string else v_back_covers | list %}
    {% set target = v_open_pos | int(100) %}
    {% set ns = namespace(needs=false) %}
    {% for c in covers %}
      {% if state_attr(c, 'current_position') | int(-1) != target %}
        {% set ns.needs = true %}
      {% endif %}
    {% endfor %}
    {{ ns.needs }}

trigger:
  # Fire whenever the sun moves (azimuth attribute update, typically every few minutes)
  - platform: state
    entity_id: sun.sun
    attribute: azimuth
    id: sun_position_changed
  - platform: homeassistant
    event: start
    id: ha_start
  # Detect manual operation on front covers (context.user_id is set for user-initiated actions)
  - platform: state
    entity_id: !input front_covers
    id: front_cover_changed
  # Detect manual operation on back covers
  - platform: state
    entity_id: !input back_covers
    id: back_cover_changed

action:
  # --- Manual override detection front ---
  # Only set override when the user CLOSES the cover (position decreases).
  # A manual open does not set the override so the automation can still close
  # the shutter when the sun starts shining on the facade later.
  - if:
      - condition: trigger
        id: front_cover_changed
      - condition: template
        value_template: "{{ trigger.to_state.context.user_id is not none }}"
      - condition: template
        value_template: "{{ v_front_override != {} }}"
      - condition: template
        value_template: >
          {% set pos_to = trigger.to_state.attributes.current_position | int(-1) %}
          {% set pos_from = trigger.from_state.attributes.current_position | int(-1) %}
          {% set is_closing = (pos_to < pos_from) if (pos_to >= 0 and pos_from >= 0) else (trigger.to_state.state == 'closed' and trigger.from_state.state != 'closed') %}
          {{ is_closing or ((v_presence_person_1 != {} or v_presence_person_2 != {}) and v_someone_home | bool) }}
    then:
      - service: input_boolean.turn_on
        target:
          entity_id: !input front_override_helper

  # --- Manual override detection back ---
  - if:
      - condition: trigger
        id: back_cover_changed
      - condition: template
        value_template: "{{ trigger.to_state.context.user_id is not none }}"
      - condition: template
        value_template: "{{ v_back_override != {} }}"
      - condition: template
        value_template: >
          {% set pos_to = trigger.to_state.attributes.current_position | int(-1) %}
          {% set pos_from = trigger.from_state.attributes.current_position | int(-1) %}
          {% set is_closing = (pos_to < pos_from) if (pos_to >= 0 and pos_from >= 0) else (trigger.to_state.state == 'closed' and trigger.from_state.state != 'closed') %}
          {{ is_closing or ((v_presence_person_1 != {} or v_presence_person_2 != {}) and v_someone_home | bool) }}
    then:
      - service: input_boolean.turn_on
        target:
          entity_id: !input back_override_helper

  # --- Sun logic (only on sun position change or HA start) ---
  - if:
      - condition: trigger
        id:
          - sun_position_changed
          - ha_start
    then:
      # Front shutters
      - if:
          - condition: template
            value_template: "{{ v_front_covers | list | length > 0 }}"
        then:
          - choose:
              # Sun on front AND weather allows AND no override (or nobody home) AND not on cooldown AND not already closed → close
              - conditions:
                  - condition: template
                    value_template: >
                      {{ v_should_close_front | bool
                         and (not v_front_override_active | bool
                              or ((v_presence_person_1 != {} or v_presence_person_2 != {}) and not v_someone_home | bool))
                         and not v_front_on_cooldown | bool
                         and v_front_needs_close | bool }}
                sequence:
                  - service: cover.set_cover_position
                    target:
                      entity_id: !input front_covers
                    data:
                      position: !input close_position
              # Sun NOT on front (or cloudy) AND sun above horizon AND auto-open enabled → open and reset override
              - conditions:
                  - condition: template
                    value_template: "{{ not v_should_close_front | bool and v_auto_open | bool and v_sun_active | bool }}"
                sequence:
                  # Only move shutters if no manual override, not on cooldown, and not already open
                  - if:
                      - condition: template
                        value_template: >
                          {{ not v_front_override_active | bool
                             and not v_front_on_cooldown | bool
                             and v_front_needs_open | bool }}
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input front_covers
                        data:
                          position: !input open_position
                  # Reset override only when the shutter is already at the open position.
                  # If the user manually closed the shutter (override ON, shutter still down),
                  # we keep the override so the automation does NOT re-open it.
                  - if:
                      - condition: template
                        value_template: "{{ v_front_override != {} and not v_front_needs_open | bool }}"
                    then:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: !input front_override_helper

      # Back shutters
      - if:
          - condition: template
            value_template: "{{ v_back_covers | list | length > 0 }}"
        then:
          - choose:
              # Sun on back AND weather allows AND no override (or nobody home) AND not on cooldown AND not already closed → close
              - conditions:
                  - condition: template
                    value_template: >
                      {{ v_should_close_back | bool
                         and (not v_back_override_active | bool
                              or ((v_presence_person_1 != {} or v_presence_person_2 != {}) and not v_someone_home | bool))
                         and not v_back_on_cooldown | bool
                         and v_back_needs_close | bool }}
                sequence:
                  - service: cover.set_cover_position
                    target:
                      entity_id: !input back_covers
                    data:
                      position: !input close_position
              # Sun NOT on back (or cloudy) AND sun above horizon AND auto-open enabled → open and reset override
              - conditions:
                  - condition: template
                    value_template: "{{ not v_should_close_back | bool and v_auto_open | bool and v_sun_active | bool }}"
                sequence:
                  # Only move shutters if no manual override, not on cooldown, and not already open
                  - if:
                      - condition: template
                        value_template: >
                          {{ not v_back_override_active | bool
                             and not v_back_on_cooldown | bool
                             and v_back_needs_open | bool }}
                    then:
                      - service: cover.set_cover_position
                        target:
                          entity_id: !input back_covers
                        data:
                          position: !input open_position
                  # Reset override only when the shutter is already at the open position.
                  # If the user manually closed the shutter (override ON, shutter still down),
                  # we keep the override so the automation does NOT re-open it.
                  - if:
                      - condition: template
                        value_template: "{{ v_back_override != {} and not v_back_needs_open | bool }}"
                    then:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: !input back_override_helper

mode: single
max_exceeded: silent
