blueprint:
  name: 📸 Camera Snapshot on Motion to Telegram 🤖
  description: >
    📦 [Version 1.9.0] Automatically capture a snapshot from your camera 📷 when motion is detected 🏃‍♂️ and send it instantly via your Telegram bot 📨.

    ✨ Features:
    - 📸 Instant high-quality snapshot.
    - 🏃‍♂️ Triggered by any motion sensor.
    - 🤖 Supports multiple Telegram bots via Config Entry and Chat ID.
    - ✍️ Fully customizable message caption.
    - ⏱️ Adjustable timeout (cooldown) between snapshots.
    - 🏠 Optional presence-based filtering (only when home/away).
  domain: automation
  author: r3mcos3
  source_url: https://github.com/r3mcos3/blueprints/blob/main/camera_motion_snapshot/camera_motion_snapshot.yaml
  input:
    motion_sensor:
      name: 🏃‍♂️ Motion Sensor
      description: 🔍 Select the sensor that should trigger the snapshot.
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
    camera:
      name: 📷 Camera
      description: 🖼️ Choose the camera to take the snapshot from.
      selector:
        entity:
          domain: camera
    telegram_bot_entry:
      name: 🤖 Telegram Bot Instance
      description: 🔌 Select the Telegram Bot integration instance to use.
      selector:
        config_entry:
          integration: telegram_bot
    target_chat_id:
      name: 🆔 Target Chat ID
      description: ✉️ The specific Telegram Chat ID to send the photo to.
      selector:
        text: {}
    message_caption:
      name: ✍️ Message Caption
      description: 📝 The full message to be sent as a caption with the photo.
      default: "🚨 Motion detected! 📸"
      selector:
        text: {}
    snapshot_path:
      name: 📂 Snapshot Path
      description: 💾 Local path to save the image (e.g., /config/www/snapshot.jpg).
      default: "/config/www/snapshot_motion.jpg"
      selector:
        text: {}
    motion_delay:
      name: ⏳ Motion Delay
      description: ⏱️ Delay between motion detection and snapshot capture (in seconds). Allows camera time to adjust before capturing.
      default: 1
      selector:
        number:
          min: 1
          max: 10
          unit_of_measurement: seconds
          mode: box
    timeout:
      name: ⏱️ Timeout (Cooldown)
      description: ⏳ The time to wait after a snapshot before allowing another one (in seconds).
      default: 60
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: seconds
          mode: box
    presence_mode:
      name: 🏠 Presence Mode
      description: 🎯 Choose when to send snapshots based on presence.
      default: always
      selector:
        select:
          options:
            - label: "🌍 Always (ignore presence)"
              value: always
            - label: "🚶 Only when away from home"
              value: away
            - label: "🏠 Only when at home"
              value: home
    person_entity:
      name: 👤 First Person Tracker
      description: 🔍 Select the first person entity to track for presence detection. Only used when Presence Mode is not set to 'Always'.
      default: []
      selector:
        entity:
          domain: person
    person_entity_2:
      name: 👤 Second Person Tracker (Optional)
      description: 🔍 Select a second person entity to track for presence detection. Only used when Presence Mode is not set to 'Always'.
      default: []
      selector:
        entity:
          domain: person

variables:
  target_chat_id_var: !input target_chat_id
  presence_mode_var: !input presence_mode
  person_entity_var: !input person_entity
  person_entity_2_var: !input person_entity_2

trigger:
  - platform: state
    entity_id: !input motion_sensor
    from: "off"
    to: "on"

mode: single

condition:
  - condition: template
    value_template: >
      {% set mode = presence_mode_var %}
      {% set p1 = person_entity_var %}
      {% set p2 = person_entity_2_var %}
      {% set p1_home = p1 != [] and states(p1) == 'home' %}
      {% set p2_home = p2 != [] and states(p2) == 'home' %}
      {% if mode == 'always' %}
        true
      {% elif mode == 'away' %}
        {{ not p1_home and not p2_home }}
      {% elif mode == 'home' %}
        {{ p1_home or p2_home }}
      {% else %}
        true
      {% endif %}

action:
  - delay: !input motion_delay
  - action: camera.snapshot
    target:
      entity_id: !input camera
    data:
      filename: !input snapshot_path
  - delay: "00:00:02"
  - action: telegram_bot.send_photo
    data:
      chat_id: "{{ target_chat_id_var }}"
      file: !input snapshot_path
      caption: !input message_caption
  - delay: !input timeout
