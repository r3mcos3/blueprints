# Version: 1.8.0
blueprint:
  domain: automation
  name: "🔥 Smart Heating Controller"
  author: r3mcos3
  source_url: https://github.com/r3mcos3/blueprints/blob/main/smart_heating/smart_heating.yaml
  homeassistant:
    min_version: 2025.12.0
  description: >
    📦 [Version 1.8.0] Intelligent climate control with presence detection, door/window protection,
    manual override, and energy-saving features! 🌡️


    Features:

    - 🏠 Presence-based temperature adjustment (home/away)

    - 🚪 Door/window open detection with heating pause

    - 🌡️ Outdoor temperature factor (disable when warm outside)

    - 🌙 Night mode with scheduled temperature reduction

    - ⏰ Pre-heating before wake-up time

    - 💧 Humidity compensation for comfort

    - ❄️ Frost protection (minimum temperature)

    - 🛠️ Manual override with configurable timeout

    - 🔍 Debug mode with persistent notification for troubleshooting

  input:
    # ===== REQUIRED: CLIMATE ENTITY =====
    climate_entity:
      name: "🌡️ Climate Entity"
      description: >
        The thermostat or climate entity to control (e.g., climate.tado).
      selector:
        entity:
          filter:
            - domain: climate

    # ===== REQUIRED: TEMPERATURE SENSORS =====
    indoor_temp_sensor:
      name: "🏠 Indoor Temperature Sensor"
      description: >
        Sensor measuring indoor temperature. Used for accurate temperature decisions.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature

    outdoor_temp_sensor:
      name: "🌤️ Outdoor Temperature Sensor"
      description: >
        Sensor measuring outdoor temperature. Heating disabled when above threshold.
      selector:
        entity:
          filter:
            - domain: sensor
              device_class: temperature

    # ===== REQUIRED: PRESENCE DETECTION =====
    presence_zone:
      name: "👥 Presence Zone"
      description: >
        The zone to monitor for presence (typically zone.home).
      selector:
        entity:
          filter:
            - domain: zone

    # ===== REQUIRED: DOOR/WINDOW SENSORS =====
    door_window_sensors:
      name: "🚪 Door/Window Sensors"
      description: >
        Binary sensors for doors and windows. Heating pauses when open for too long.
      selector:
        entity:
          multiple: true
          filter:
            - domain: binary_sensor
              device_class:
                - door
                - window
                - opening

    # ===== TEMPERATURE SETTINGS (COLLAPSED) =====
    temperature_settings:
      name: "🌡️ Temperature Settings"
      icon: mdi:thermometer
      collapsed: true
      input:
        comfort_temp:
          name: "🏠 Comfort Temperature (Default)"
          description: >
            Default target temperature when people are home. This value is used when no helper is configured.
          default: 21
          selector:
            number:
              min: 5
              max: 25
              step: 1
              unit_of_measurement: "°C"
              mode: slider

        comfort_temp_helper:
          name: "🎛️ Comfort Temperature Helper (Optional)"
          description: >
            Optional input_number helper to dynamically adjust comfort temperature via UI.
            When configured, this overrides the default comfort temperature above.
            Create a helper: input_number.heating_comfort_temp (min: 5, max: 25, step: 0.5)
          default: {}
          selector:
            entity:
              filter:
                - domain: input_number

        away_temp:
          name: "🏃 Away Temperature"
          description: >
            Target temperature when nobody is home.
          default: 17
          selector:
            number:
              min: 5
              max: 25
              step: 1
              unit_of_measurement: "°C"
              mode: slider

        frost_protection_temp:
          name: "❄️ Frost Protection Temperature"
          description: >
            Minimum temperature to prevent pipes freezing. Never goes below this.
          default: 7
          selector:
            number:
              min: 5
              max: 25
              step: 1
              unit_of_measurement: "°C"
              mode: slider

        night_temp:
          name: "🌙 Night Temperature"
          description: >
            Target temperature during sleeping hours.
          default: 18
          selector:
            number:
              min: 5
              max: 25
              step: 1
              unit_of_measurement: "°C"
              mode: slider

        outdoor_temp_threshold:
          name: "🌡️ Outdoor Temperature Threshold"
          description: >
            When outdoor temperature exceeds this value, heating will be disabled (eco mode).
          default: 18
          selector:
            number:
              min: 5
              max: 25
              step: 1
              unit_of_measurement: "°C"
              mode: slider

    # ===== DOOR/WINDOW SETTINGS (COLLAPSED) =====
    door_window_settings:
      name: "🚪 Door/Window Settings"
      icon: mdi:door
      collapsed: true
      input:
        door_open_delay:
          name: "⏱️ Door Open Delay"
          description: >
            Time to wait before pausing heating when a door/window opens.
            Heating only pauses after the door has been continuously open for this duration.
          default: 300
          selector:
            number:
              min: 30
              max: 600
              step: 30
              unit_of_measurement: "seconds"
              mode: slider

        door_closed_delay:
          name: "⏱️ Door Closed Resume Delay"
          description: >
            Time to wait before resuming heating after all doors/windows close.
          default: 60
          selector:
            number:
              min: 10
              max: 180
              step: 10
              unit_of_measurement: "seconds"
              mode: slider

    # ===== NIGHT MODE SETTINGS (COLLAPSED) =====
    night_mode_settings:
      name: "🌙 Night Mode Settings"
      icon: mdi:weather-night
      collapsed: true
      input:
        use_night_mode:
          name: "🌙 Enable Night Mode"
          description: >
            Enable automatic temperature reduction during sleeping hours.
          default: true
          selector:
            boolean:

        night_start:
          name: "🌙 Night Start Time"
          description: >
            Time when night mode begins.
          default: "23:00:00"
          selector:
            time:

        night_end:
          name: "☀️ Night End Time"
          description: >
            Time when night mode ends.
          default: "07:00:00"
          selector:
            time:

        use_preheat:
          name: "⏰ Enable Pre-heating"
          description: >
            Start heating before night mode ends to reach comfort temperature when you wake up.
          default: true
          selector:
            boolean:

        preheat_minutes:
          name: "⏰ Pre-heat Duration"
          description: >
            How many minutes before night mode ends to start pre-heating.
          default: 30
          selector:
            number:
              min: 15
              max: 90
              step: 5
              unit_of_measurement: "minutes"
              mode: slider

    # ===== HUMIDITY SETTINGS (COLLAPSED) =====
    humidity_settings:
      name: "💧 Humidity Settings"
      icon: mdi:water-percent
      collapsed: true
      input:
        use_humidity:
          name: "💧 Enable Humidity Factor"
          description: >
            Adjust target temperature based on humidity (high humidity feels warmer).
          default: false
          selector:
            boolean:

        humidity_sensor:
          name: "💧 Humidity Sensor"
          description: >
            Indoor humidity sensor (optional).
          default: {}
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: humidity

    # ===== MANUAL OVERRIDE SETTINGS (COLLAPSED) =====
    manual_override_settings:
      name: "🛠️ Manual Override Settings"
      icon: mdi:hand-back-right
      collapsed: true
      input:
        override_duration:
          name: "⏱️ Override Duration"
          description: >
            How long manual override should last before automation resumes (1-12 hours).
          default: 2
          selector:
            number:
              min: 1
              max: 12
              step: 1
              unit_of_measurement: "hours"
              mode: slider

        override_helper:
          name: "🔘 Override Helper"
          description: >
            Input boolean helper to activate/deactivate override (create: input_boolean.heating_override_active). Leave empty to disable this feature.
          default: {}
          selector:
            entity:
              filter:
                - domain: input_boolean

    # ===== VIRTUAL WINDOW DETECTION (COLLAPSED) =====
    virtual_window_settings:
      name: "🪟 Virtual Window Detection"
      icon: mdi:thermometer-alert
      collapsed: true
      input:
        use_virtual_window_detection:
          name: "🪟 Enable Virtual Window Detection"
          description: >
            Detect open windows by monitoring rapid indoor temperature drops, even without
            physical sensors. Heating pauses when a sudden drop is detected and resumes
            automatically after the next periodic check (~15 min).
          default: false
          selector:
            boolean:

        virtual_window_temp_drop:
          name: "🌡️ Temperature Drop Threshold"
          description: >
            Minimum temperature drop between two consecutive sensor readings to trigger
            virtual window detection.
          default: 1.5
          selector:
            number:
              min: 0.5
              max: 3.0
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

    # ===== GRADUAL TRANSITION SETTINGS (COLLAPSED) =====
    transition_settings:
      name: "🔄 Gradual Transition Settings"
      icon: mdi:trending-up
      collapsed: true
      input:
        use_gradual_transitions:
          name: "🔄 Enable Gradual Transitions"
          description: >
            Instead of jumping directly to the target temperature, gradually step up or down
            by a fixed amount every 15 minutes. Makes temperature changes feel more natural.
          default: false
          selector:
            boolean:

        transition_step:
          name: "↗️ Temperature Step"
          description: >
            Temperature change per step, applied every 15 minutes during gradual transitions.
          default: 0.5
          selector:
            number:
              min: 0.5
              max: 2.0
              step: 0.5
              unit_of_measurement: "°C"
              mode: slider

    # ===== DEBUG SETTINGS (COLLAPSED) =====
    debug_settings:
      name: "🔍 Debug Settings"
      icon: mdi:bug
      collapsed: true
      input:
        enable_debug_mode:
          name: "🔍 Enable Debug Mode"
          description: >
            Creates or updates a persistent notification after every automation run,
            showing the current heating mode, target temperature, and all relevant state
            values. Useful for troubleshooting unexpected behavior — disable when not needed.
          default: false
          selector:
            boolean:

mode: single
max_exceeded: silent

variables:
  # Input references
  climate: !input climate_entity
  indoor_sensor: !input indoor_temp_sensor
  outdoor_sensor: !input outdoor_temp_sensor
  zone: !input presence_zone
  door_sensors: !input door_window_sensors

  # Temperature settings - comfort temp uses helper if configured, otherwise default
  comfort_temp_default: !input comfort_temp
  comfort_temp_entity: !input comfort_temp_helper
  temp_comfort: >
    {% if comfort_temp_entity != {} and comfort_temp_entity != '' %}
      {{ states(comfort_temp_entity) | float(comfort_temp_default) }}
    {% else %}
      {{ comfort_temp_default }}
    {% endif %}
  temp_away: !input away_temp
  temp_frost: !input frost_protection_temp
  temp_night: !input night_temp
  outdoor_threshold: !input outdoor_temp_threshold

  # Feature toggles
  night_mode_enabled: !input use_night_mode
  preheat_enabled: !input use_preheat
  humidity_enabled: !input use_humidity

  # Other settings
  preheat_mins: !input preheat_minutes
  humidity_entity: !input humidity_sensor
  night_start_time: !input night_start
  night_end_time: !input night_end

  # Manual override settings
  override_duration_hours: !input override_duration
  override_entity: !input override_helper

  # Virtual window detection
  virtual_window_enabled: !input use_virtual_window_detection
  virtual_window_temp_drop_threshold: !input virtual_window_temp_drop

  # Gradual transitions
  gradual_transitions_enabled: !input use_gradual_transitions
  transition_step_size: !input transition_step

  # Debug
  debug_mode_enabled: !input enable_debug_mode

triggers:
  # ===== STARTUP TRIGGERS =====
  - trigger: homeassistant
    event: start
    id: ha_start

  - trigger: event
    event_type: automation_reloaded
    id: automation_reload

  # ===== PRESENCE TRIGGERS =====
  - trigger: numeric_state
    entity_id: !input presence_zone
    above: 0
    id: arrived_home

  - trigger: numeric_state
    entity_id: !input presence_zone
    below: 1
    id: left_home

  # ===== DOOR/WINDOW TRIGGERS =====
  - trigger: state
    entity_id: !input door_window_sensors
    to: "on"
    for:
      seconds: !input door_open_delay
    id: door_opened

  - trigger: state
    entity_id: !input door_window_sensors
    to: "off"
    for:
      seconds: !input door_closed_delay
    id: door_closed

  # ===== OUTDOOR TEMPERATURE TRIGGERS =====
  - trigger: numeric_state
    entity_id: !input outdoor_temp_sensor
    above: !input outdoor_temp_threshold
    id: outdoor_warm

  - trigger: numeric_state
    entity_id: !input outdoor_temp_sensor
    below: !input outdoor_temp_threshold
    id: outdoor_cold

  # ===== TIME-BASED TRIGGERS =====
  - trigger: time
    at: !input night_start
    id: night_start

  - trigger: time
    at: !input night_end
    id: night_end

  # ===== PERIODIC CHECK (every 15 minutes) =====
  - trigger: time_pattern
    minutes: "/15"
    id: periodic_check

  # ===== MANUAL OVERRIDE TOGGLE =====
  - trigger: state
    entity_id: !input override_helper
    id: override_toggled

  # ===== COMFORT TEMPERATURE HELPER CHANGE =====
  - trigger: state
    entity_id: !input comfort_temp_helper
    id: comfort_temp_changed

  # ===== VIRTUAL WINDOW: RAPID INDOOR TEMPERATURE DROP =====
  - trigger: state
    entity_id: !input indoor_temp_sensor
    id: indoor_rapid_drop

conditions: []

actions:
  # ===== CALCULATE CURRENT STATE =====
  - variables:
      current_outdoor: "{{ states(outdoor_sensor) | float(10) }}"
      current_indoor: "{{ states(indoor_sensor) | float(20) }}"
      people_count: "{{ states(zone) | int(0) }}"
      is_outdoor_warm: "{{ current_outdoor >= outdoor_threshold }}"

      # Adaptive pre-heat: scale preheat window by how cold it is outside
      # (colder outside → longer warm-up needed; capped at 3× base)
      effective_preheat_mins: >
        {% if preheat_enabled and night_mode_enabled %}
          {% set factor = [(outdoor_threshold - current_outdoor) / 10 + 1, 1.0] | max %}
          {{ (preheat_mins * [factor, 3.0] | min) | round(0) | int }}
        {% else %}
          {{ preheat_mins }}
        {% endif %}

      # Calculate if it's night time
      is_night: >
        {% if night_mode_enabled %}
          {% set now_time = now().strftime('%H:%M:%S') %}
          {% set start = night_start_time %}
          {% set end = night_end_time %}
          {% if start > end %}
            {{ now_time >= start or now_time < end }}
          {% else %}
            {{ now_time >= start and now_time < end }}
          {% endif %}
        {% else %}
          false
        {% endif %}

      # Calculate pre-heat time
      is_preheat_time: >
        {% if preheat_enabled and night_mode_enabled %}
          {% set end_parts = night_end_time.split(':') %}
          {% set end_hour = end_parts[0] | int %}
          {% set end_min = end_parts[1] | int %}
          {% set total_mins = end_hour * 60 + end_min - effective_preheat_mins %}
          {% if total_mins < 0 %}
            {% set total_mins = total_mins + 1440 %}
          {% endif %}
          {% set preheat_hour = (total_mins // 60) | int %}
          {% set preheat_min = (total_mins % 60) | int %}
          {% set preheat_time = '%02d:%02d:00' | format(preheat_hour, preheat_min) %}
          {% set now_time = now().strftime('%H:%M:%S') %}
          {% if preheat_time > night_end_time %}
            {{ now_time >= preheat_time or now_time < night_end_time }}
          {% else %}
            {{ now_time >= preheat_time and now_time < night_end_time }}
          {% endif %}
        {% else %}
          false
        {% endif %}

      # Check if any door/window is open (used only for door_opened/door_closed trigger branches)
      any_opening_open: >
        {% set ns = namespace(open=false) %}
        {% for sensor in door_sensors %}
          {% if states(sensor) == 'on' %}
            {% set ns.open = true %}
          {% endif %}
        {% endfor %}
        {{ ns.open }}

      # Humidity adjustment
      humidity_adjustment: >
        {% if humidity_enabled and humidity_entity != {} and humidity_entity != '' %}
          {% set humidity = states(humidity_entity) | float(50) %}
          {% if humidity > 70 %}
            -0.5
          {% elif humidity < 30 %}
            0.5
          {% else %}
            0
          {% endif %}
        {% else %}
          0
        {% endif %}

      # Manual override state
      override_is_active: >
        {% if override_entity != {} and override_entity != '' %}
          {{ is_state(override_entity, 'on') }}
        {% else %}
          false
        {% endif %}

      override_has_expired: >
        {% if override_is_active and override_entity != {} and override_entity != '' %}
          {% set last_changed_ts = as_timestamp(states[override_entity].last_changed) | float(0) %}
          {% if last_changed_ts > 0 %}
            {% set now_ts = now().timestamp() %}
            {% set elapsed_hours = (now_ts - last_changed_ts) / 3600 %}
            {{ elapsed_hours >= override_duration_hours }}
          {% else %}
            false
          {% endif %}
        {% else %}
          false
        {% endif %}

  # ===== DETERMINE TARGET MODE AND TEMPERATURE =====
  - variables:
      current_target: "{{ state_attr(climate, 'temperature') | float(0) }}"
      hvac_mode: "{{ states(climate) }}"

      target_mode: >
        {% if current_indoor < temp_frost %}
          frost_protection
        {% elif override_is_active and not override_has_expired %}
          manual_override
        {% elif is_outdoor_warm %}
          eco
        {% elif people_count == 0 %}
          away
        {% elif is_preheat_time %}
          preheat
        {% elif is_night %}
          night
        {% else %}
          comfort
        {% endif %}

      target_temp: >
        {% set adj = humidity_adjustment | float(0) %}
        {% if target_mode == 'frost_protection' %}
          {{ temp_frost }}
        {% elif target_mode == 'manual_override' %}
          {{ current_target }}
        {% elif target_mode == 'eco' %}
          {{ temp_frost }}
        {% elif target_mode == 'away' %}
          {{ temp_away }}
        {% elif target_mode == 'preheat' %}
          {{ temp_comfort + adj }}
        {% elif target_mode == 'night' %}
          {{ temp_night + adj }}
        {% else %}
          {{ temp_comfort + adj }}
        {% endif %}

      heat_needed: "{{ current_indoor < target_temp }}"

  # ===== MAIN CONTROL LOGIC =====
  - choose:
      # ----- FROST PROTECTION (highest priority) -----
      - conditions:
          - condition: template
            value_template: "{{ target_mode == 'frost_protection' }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ temp_frost }}"
              hvac_mode: heat

      # ----- MANUAL OVERRIDE: CANCEL ON LEAVE HOME -----
      - conditions:
          - condition: trigger
            id: left_home
          - condition: template
            value_template: "{{ override_is_active }}"
          - condition: template
            value_template: "{{ override_entity != {} and override_entity != '' }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ override_entity }}"
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ temp_away }}"

      # ----- MANUAL OVERRIDE: CANCEL ON TIMEOUT -----
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ override_has_expired }}"
          - condition: template
            value_template: "{{ override_entity != {} and override_entity != '' }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ override_entity }}"
          - variables:
              # Calculate post-override temperature based on current state
              post_override_temp: >
                {% set adj = humidity_adjustment | float(0) %}
                {% if people_count == 0 %}
                  {{ temp_away }}
                {% elif is_preheat_time %}
                  {{ temp_comfort + adj }}
                {% elif is_night %}
                  {{ temp_night + adj }}
                {% else %}
                  {{ temp_comfort + adj }}
                {% endif %}
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ post_override_temp }}"
              hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- MANUAL OVERRIDE: USER CANCELLED (turned off helper manually) -----
      - conditions:
          - condition: trigger
            id: override_toggled
          - condition: template
            value_template: "{{ override_entity != {} and override_entity != '' }}"
          - condition: template
            value_template: "{{ is_state(override_entity, 'off') }}"
          - condition: template
            value_template: "{{ trigger.to_state.state == 'off' and trigger.from_state.state == 'on' }}"
        sequence:
          - variables:
              # Calculate appropriate temperature after manual cancellation
              post_cancel_temp: >
                {% set adj = humidity_adjustment | float(0) %}
                {% if current_indoor < temp_frost %}
                  {{ temp_frost }}
                {% elif is_outdoor_warm %}
                  {{ temp_frost }}
                {% elif people_count == 0 %}
                  {{ temp_away }}
                {% elif is_preheat_time %}
                  {{ temp_comfort + adj }}
                {% elif is_night %}
                  {{ temp_night + adj }}
                {% else %}
                  {{ temp_comfort + adj }}
                {% endif %}
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ post_cancel_temp }}"
              hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- MANUAL OVERRIDE: FROST PROTECTION OVERRIDE -----
      - conditions:
          - condition: template
            value_template: "{{ override_is_active }}"
          - condition: template
            value_template: "{{ current_indoor < temp_frost }}"
          - condition: template
            value_template: "{{ override_entity != {} and override_entity != '' }}"
        sequence:
          - action: input_boolean.turn_off
            target:
              entity_id: "{{ override_entity }}"
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ temp_frost }}"
              hvac_mode: heat

      # ----- OUTDOOR WARM - ECO MODE -----
      - conditions:
          - condition: template
            value_template: "{{ target_mode == 'eco' }}"
          - condition: template
            value_template: "{{ hvac_mode != 'off' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ climate }}"
            data:
              hvac_mode: "off"

      # ----- DOOR/WINDOW OPEN -----
      - conditions:
          - condition: trigger
            id: door_opened
          - condition: template
            value_template: "{{ any_opening_open }}"
          - condition: template
            value_template: "{{ hvac_mode != 'off' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ climate }}"
            data:
              hvac_mode: "off"

      # ----- VIRTUAL WINDOW OPEN (rapid indoor temp drop) -----
      - conditions:
          - condition: trigger
            id: indoor_rapid_drop
          - condition: template
            value_template: "{{ virtual_window_enabled }}"
          - condition: template
            value_template: >
              {{ (trigger.from_state.state | float(20) - trigger.to_state.state | float(20))
                 >= virtual_window_temp_drop_threshold }}
          - condition: template
            value_template: "{{ hvac_mode != 'off' }}"
          - condition: template
            value_template: "{{ not any_opening_open }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: "{{ climate }}"
            data:
              hvac_mode: "off"

      # ----- AWAY MODE -----
      - conditions:
          - condition: trigger
            id: left_home
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ temp_away }}"

      # ----- ARRIVED HOME -----
      - conditions:
          - condition: trigger
            id: arrived_home
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ target_temp }}"
              hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- DOOR CLOSED - RESUME -----
      - conditions:
          - condition: trigger
            id: door_closed
          - condition: template
            value_template: "{{ not any_opening_open }}"
          - condition: template
            value_template: "{{ target_mode != 'eco' }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ target_temp }}"
              hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- NIGHT START -----
      - conditions:
          - condition: trigger
            id: night_start
          - condition: template
            value_template: "{{ night_mode_enabled }}"
          - condition: template
            value_template: "{{ people_count > 0 }}"
          - condition: template
            value_template: "{{ not override_is_active }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ temp_night + humidity_adjustment | float(0) }}"

      # ----- NIGHT END -----
      - conditions:
          - condition: trigger
            id: night_end
          - condition: template
            value_template: "{{ people_count > 0 }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ temp_comfort + humidity_adjustment | float(0) }}"
              hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- OUTDOOR COLD AGAIN -----
      - conditions:
          - condition: trigger
            id: outdoor_cold
          - condition: template
            value_template: "{{ hvac_mode == 'off' }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ target_temp }}"
              hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- PRE-HEAT MODE -----
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ target_mode == 'preheat' }}"
          - condition: template
            value_template: "{{ (current_target - target_temp) | abs > 0.5 }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ target_temp }}"
              hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- COMFORT TEMPERATURE HELPER CHANGED -----
      - conditions:
          - condition: trigger
            id: comfort_temp_changed
          - condition: template
            value_template: "{{ target_mode == 'comfort' }}"
          - condition: template
            value_template: "{{ people_count > 0 }}"
          - condition: template
            value_template: "{{ not override_is_active }}"
        sequence:
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ temp_comfort + humidity_adjustment | float(0) }}"

      # ----- STARTUP / RELOAD (initialize state) -----
      - conditions:
          - condition: trigger
            id:
              - ha_start
              - automation_reload
        sequence:
          - delay:
              seconds: 30
          # First, disable any expired override helper (edge case: restart during expired override)
          - if:
              - condition: template
                value_template: "{{ override_has_expired and override_entity != {} and override_entity != '' }}"
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: "{{ override_entity }}"
          # Recalculate post-override temperature since helper state may have just changed
          - variables:
              startup_target_temp: >
                {% set adj = humidity_adjustment | float(0) %}
                {% set still_overriding = override_entity != {} and override_entity != '' and is_state(override_entity, 'on') and not override_has_expired %}
                {% if current_indoor < temp_frost %}
                  {{ temp_frost }}
                {% elif still_overriding %}
                  {{ current_target }}
                {% elif is_outdoor_warm %}
                  {{ temp_frost }}
                {% elif people_count == 0 %}
                  {{ temp_away }}
                {% elif is_preheat_time %}
                  {{ temp_comfort + adj }}
                {% elif is_night %}
                  {{ temp_night + adj }}
                {% else %}
                  {{ temp_comfort + adj }}
                {% endif %}
              startup_is_eco: "{{ is_outdoor_warm and not (current_indoor < temp_frost) }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ startup_is_eco }}"
                sequence:
                  - action: climate.set_hvac_mode
                    target:
                      entity_id: "{{ climate }}"
                    data:
                      hvac_mode: "off"
            default:
              - action: climate.set_temperature
                target:
                  entity_id: "{{ climate }}"
                data:
                  temperature: "{{ startup_target_temp }}"
                  hvac_mode: "{{ 'heat' if heat_needed else hvac_mode }}"

      # ----- PERIODIC CHECK (sync state) -----
      - conditions:
          - condition: trigger
            id: periodic_check
          - condition: template
            value_template: "{{ target_mode not in ['eco', 'preheat', 'manual_override'] }}"
          - condition: template
            value_template: "{{ not any_opening_open }}"
          - condition: template
            value_template: >
              {{ (current_target - target_temp) | abs >
                 (transition_step_size / 2 if gradual_transitions_enabled else 0.5) }}
        sequence:
          - variables:
              sync_target_temp: >
                {% if gradual_transitions_enabled %}
                  {% set step = transition_step_size | float(0.5) %}
                  {% set gap = target_temp - current_target %}
                  {% if gap > step %}
                    {{ current_target + step }}
                  {% elif gap < -step %}
                    {{ current_target - step }}
                  {% else %}
                    {{ target_temp }}
                  {% endif %}
                {% else %}
                  {{ target_temp }}
                {% endif %}
          - action: climate.set_temperature
            target:
              entity_id: "{{ climate }}"
            data:
              temperature: "{{ sync_target_temp }}"
              hvac_mode: "{{ 'heat' if current_indoor < sync_target_temp else hvac_mode }}"

  # ===== DEBUG NOTIFICATION =====
  - if:
      - condition: template
        value_template: "{{ debug_mode_enabled | bool(false) }}"
    then:
      - action: persistent_notification.create
        data:
          title: "🔥 Smart Heating Debug"
          notification_id: "smart_heating_debug"
          message: >
            **Mode:** {{ target_mode }}
            **Target temp:** {{ target_temp }}°C
            **Indoor:** {{ current_indoor }}°C | **Outdoor:** {{ current_outdoor }}°C
            **People home:** {{ people_count }}
            **Night:** {{ is_night }} | **Pre-heat:** {{ is_preheat_time }}
            **Override active:** {{ override_is_active }}
            **Any door/window open:** {{ any_opening_open }}
            **Last run:** {{ now().strftime('%Y-%m-%d %H:%M:%S') }}
